<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Italiana&amp;family=Jura:wght@300;400&amp;display=swap');
    </style>
    <radialGradient id="glow-sq" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#588288" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#588288" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2-sq" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8E3D8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#588288" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sq" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur2-sq" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- Background particles -->
  <circle cx="40" cy="60" r="1" fill="#588288" opacity="0.4"/>
  <circle cx="460" cy="80" r="0.8" fill="#E8E3D8" opacity="0.25"/>
  <circle cx="420" cy="420" r="1.2" fill="#588288" opacity="0.3"/>
  <circle cx="70" cy="430" r="0.9" fill="#E8E3D8" opacity="0.2"/>
  <circle cx="250" cy="35" r="0.7" fill="#8A9DBB" opacity="0.35"/>
  <circle cx="480" cy="250" r="0.8" fill="#588288" opacity="0.25"/>
  <circle cx="20" cy="250" r="0.6" fill="#8A9DBB" opacity="0.2"/>
  <circle cx="380" cy="140" r="0.7" fill="#E8E3D8" opacity="0.15"/>
  <circle cx="130" cy="370" r="0.6" fill="#588288" opacity="0.2"/>

  <!-- Icon center: (250, 195), ellipse rx=118 ry=52 -->
  <!-- Node positions:
       E (368,195) NE (309,150) NW (191,150) W (132,195) SW (191,240) SE (309,240) -->

  <!-- Orbital ellipse -->
  <ellipse cx="250" cy="195" rx="118" ry="52" fill="none" stroke="#588288" stroke-width="1.1" opacity="0.45"/>

  <!-- Hub lines center to nodes -->
  <line x1="250" y1="195" x2="368" y2="195" stroke="#588288" stroke-width="0.9" opacity="0.55"/>
  <line x1="250" y1="195" x2="132" y2="195" stroke="#588288" stroke-width="0.9" opacity="0.55"/>
  <line x1="250" y1="195" x2="309" y2="150" stroke="#588288" stroke-width="0.8" opacity="0.45"/>
  <line x1="250" y1="195" x2="191" y2="150" stroke="#588288" stroke-width="0.8" opacity="0.45"/>
  <line x1="250" y1="195" x2="309" y2="240" stroke="#588288" stroke-width="0.8" opacity="0.45"/>
  <line x1="250" y1="195" x2="191" y2="240" stroke="#588288" stroke-width="0.8" opacity="0.45"/>

  <!-- Perimeter connections -->
  <line x1="368" y1="195" x2="309" y2="150" stroke="#588288" stroke-width="0.55" opacity="0.28"/>
  <line x1="309" y1="150" x2="191" y2="150" stroke="#588288" stroke-width="0.55" opacity="0.28"/>
  <line x1="191" y1="150" x2="132" y2="195" stroke="#588288" stroke-width="0.55" opacity="0.28"/>
  <line x1="132" y1="195" x2="191" y2="240" stroke="#588288" stroke-width="0.55" opacity="0.28"/>
  <line x1="191" y1="240" x2="309" y2="240" stroke="#588288" stroke-width="0.55" opacity="0.28"/>
  <line x1="309" y1="240" x2="368" y2="195" stroke="#588288" stroke-width="0.55" opacity="0.28"/>

  <!-- Center glow halo -->
  <circle cx="250" cy="195" r="36" fill="url(#glow-sq)" filter="url(#blur-sq)"/>

  <!-- Orbital nodes -->
  <circle cx="368" cy="195" r="7" fill="#588288"/>
  <circle cx="132" cy="195" r="7" fill="#588288"/>
  <circle cx="309" cy="150" r="5.5" fill="#8A9DBB" opacity="0.9"/>
  <circle cx="191" cy="150" r="5.5" fill="#8A9DBB" opacity="0.9"/>
  <circle cx="309" cy="240" r="4.5" fill="#8A9DBB" opacity="0.75"/>
  <circle cx="191" cy="240" r="4.5" fill="#8A9DBB" opacity="0.75"/>

  <!-- Center node -->
  <circle cx="250" cy="195" r="20" fill="url(#glow2-sq)" filter="url(#blur2-sq)"/>
  <circle cx="250" cy="195" r="10" fill="#588288" opacity="0.6"/>
  <circle cx="250" cy="195" r="5.5" fill="#E8E3D8"/>

  <!-- Logo name: "Velaluna" centered -->
  <text text-anchor="middle" x="250" y="348" font-family="Italiana, 'Times New Roman', Georgia, serif" font-size="60" letter-spacing="1.5">
    <tspan fill="#E8E3D8">Vela</tspan><tspan fill="#588288">luna</tspan>
  </text>

  <!-- Separator line -->
  <line x1="138" y1="362" x2="362" y2="362" stroke="#588288" stroke-width="0.7" opacity="0.4"/>

  <!-- Tagline -->
  <text text-anchor="middle" x="250" y="392" font-family="Jura, 'Gill Sans', 'Trebuchet MS', sans-serif" font-size="15" fill="#8A9DBB" letter-spacing="4.5" font-weight="300">learn by connection</text>
</svg>
