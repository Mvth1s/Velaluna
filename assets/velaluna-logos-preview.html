<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velaluna — Logos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Jura:wght@300;400&family=Instrument+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --space:   #00001A;
    --night:   #101828;
    --deep:    #1A2744;
    --stellar: #588288;
    --slate:   #8A9DBB;
    --ivory:   #E8E3D8;
    --sand:    #C8B898;
  }

  body {
    background: var(--space);
    color: var(--ivory);
    font-family: 'Instrument Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 60px 40px;
  }

  header {
    margin-bottom: 80px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(88,130,136,0.2);
  }

  header h1 {
    font-family: 'Italiana', serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--ivory);
    font-weight: 400;
  }

  header p {
    font-size: 12px;
    color: var(--slate);
    letter-spacing: 3px;
    margin-top: 6px;
    font-family: 'Jura', sans-serif;
  }

  .section {
    margin-bottom: 80px;
  }

  .section-label {
    font-family: 'Jura', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--stellar);
    text-transform: uppercase;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(88,130,136,0.2);
  }

  .logo-card {
    background: var(--night);
    border: 1px solid rgba(88,130,136,0.15);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
  }

  .logo-card.square-card {
    max-width: 420px;
    aspect-ratio: 1;
  }

  .logo-card svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .favicon-row {
    display: flex;
    gap: 24px;
    align-items: flex-end;
  }

  .favicon-swatch {
    background: var(--night);
    border: 1px solid rgba(88,130,136,0.15);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 12px;
  }

  .favicon-swatch span {
    font-family: 'Jura', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--slate);
  }

  .favicon-swatch svg {
    display: block;
  }

  .note {
    margin-top: 16px;
    font-size: 12px;
    color: var(--slate);
    font-family: 'Jura', sans-serif;
    letter-spacing: 1px;
  }
</style>
</head>
